<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css">
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:0;display:flex;flex-direction:column;height:100vh}
    #controls{padding:10px;background:#f6f6f6;display:flex;gap:8px;align-items:center}
    #viewer{padding:18px;overflow:auto;flex:1}
    #main{display:flex;flex:1;height:100%}
    #viewer{width:100%}
    #file{flex:1;padding:6px}
  </style>
</head>
<body>
  <div id="controls">
    <input id="file" placeholder="Enter markdown path (e.g., qa-cheat-sheet.md)" />
    <button id="load">Load</button>
    <label><input type="checkbox" id="raw"/> Show raw</label>
    <span style="opacity:.6;font-size:13px">Open with query param: <code>?file=qa-cheat-sheet.md</code></span>
  </div>
  <div id="main">
    <div id="viewer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="./preview.js"></script>
</body>
</html>
